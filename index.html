<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iridescent Shaders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Space Mono', monospace;
            background: #000;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 0;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 10;
        }

        button {
            padding: 10px 20px;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0;
            cursor: pointer;
            font-size: 12px;
            font-weight: 400;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 255, 255, 0.4);
        }

        button.active {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 1);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 8px;
            padding-left: 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }

        .slider-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Space Mono', monospace;
        }

        input[type="range"] {
            width: 120px;
            height: 1px;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 1);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.15);
        }

        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 1);
            transition: all 0.2s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.15);
        }

        #error {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b6b;
            padding: 12px 24px;
            background: rgba(255, 0, 0, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 8px;
            border: 1px solid rgba(255, 107, 107, 0.3);
            display: none;
            font-size: 13px;
        }

        #notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 0;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: none;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #notification.show {
            display: block;
            opacity: 1;
        }

        select {
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.5);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            outline: none;
        }

        select:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 0.4);
        }

        select option {
            background: #000;
            color: #fff;
        }

        #gradient-editor {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px;
            display: none;
            z-index: 100;
            min-width: 500px;
        }

        #gradient-editor.show {
            display: block;
        }

        .gradient-preview {
            width: 100%;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
            position: relative;
        }

        .color-stop {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
        }

        .color-stop input[type="color"] {
            width: 40px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            cursor: pointer;
        }

        .color-stop input[type="number"] {
            width: 60px;
            padding: 6px;
            background: rgba(0, 0, 0, 0.5);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
        }

        .color-stop input[type="text"] {
            width: 80px;
            padding: 6px;
            background: rgba(0, 0, 0, 0.5);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
        }

        .color-stop button {
            padding: 6px 12px;
            font-size: 10px;
        }

        .editor-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .editor-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-family: 'Space Mono', monospace;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="gradient-editor">
        <div class="editor-title">Gradient Map Editor</div>
        <div class="gradient-preview" id="gradient-preview"></div>
        <div id="color-stops-container"></div>
        <div class="editor-buttons">
            <button id="add-stop">Add Color Stop</button>
            <button id="apply-gradient">Apply</button>
            <button id="close-editor">Close</button>
        </div>
    </div>

    <div id="controls">
        <button id="pearl" class="active">Pearl</button>
        <button id="opal">Opal</button>
        <button id="flow">Flow</button>
        <button id="waves">Waves</button>

        <div class="slider-container">
            <span class="slider-label">Grain</span>
            <input type="range" id="grain" min="0" max="100" value="50">
        </div>

        <div class="slider-container">
            <span class="slider-label">Gradient</span>
            <select id="gradient">
                <option value="none">None</option>
                <option value="purple-pink">Purple-Pink</option>
                <option value="ocean">Ocean</option>
                <option value="sunset">Sunset</option>
                <option value="forest">Forest</option>
                <option value="fire">Fire</option>
                <option value="ice">Ice</option>
                <option value="neon">Neon</option>
            </select>
        </div>
    </div>

    <div id="error"></div>
    <div id="notification"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true }) || canvas.getContext('experimental-webgl', { preserveDrawingBuffer: true });
        const errorDiv = document.getElementById('error');
        const notificationDiv = document.getElementById('notification');
        const grainSlider = document.getElementById('grain');
        const gradientSelect = document.getElementById('gradient');
        const gradientEditor = document.getElementById('gradient-editor');
        const gradientPreview = document.getElementById('gradient-preview');
        const colorStopsContainer = document.getElementById('color-stops-container');

        // Set canvas to full screen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        if (!gl) {
            errorDiv.textContent = 'WebGL not supported!';
            errorDiv.style.display = 'block';
        }

        let program;
        let startTime = Date.now();
        let mouseX = 0.5;
        let mouseY = 0.5;
        let grainAmount = 0.5;
        let gradientStops = [];
        let useGradientMap = false;

        // Gradient presets
        const gradientPresets = {
            'none': [],
            'purple-pink': [
                { pos: 0.0, color: '#3d1f5c' },
                { pos: 0.5, color: '#8b5aa8' },
                { pos: 1.0, color: '#e8b8d4' }
            ],
            'ocean': [
                { pos: 0.0, color: '#001f3f' },
                { pos: 0.5, color: '#0074D9' },
                { pos: 1.0, color: '#7FDBFF' }
            ],
            'sunset': [
                { pos: 0.0, color: '#1a0a2e' },
                { pos: 0.3, color: '#ff6b6b' },
                { pos: 0.7, color: '#feca57' },
                { pos: 1.0, color: '#fff' }
            ],
            'forest': [
                { pos: 0.0, color: '#0d3b0d' },
                { pos: 0.5, color: '#2d882d' },
                { pos: 1.0, color: '#aad576' }
            ],
            'fire': [
                { pos: 0.0, color: '#1a0000' },
                { pos: 0.3, color: '#ff0000' },
                { pos: 0.7, color: '#ff6600' },
                { pos: 1.0, color: '#ffff00' }
            ],
            'ice': [
                { pos: 0.0, color: '#0a2239' },
                { pos: 0.5, color: '#53b3cb' },
                { pos: 1.0, color: '#d4f1f4' }
            ],
            'neon': [
                { pos: 0.0, color: '#ff006e' },
                { pos: 0.33, color: '#8338ec' },
                { pos: 0.66, color: '#3a86ff' },
                { pos: 1.0, color: '#06ffa5' }
            ]
        };

        // Track mouse position
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX / canvas.width;
            mouseY = 1.0 - (e.clientY / canvas.height);
        });

        // Grain slider
        grainSlider.addEventListener('input', (e) => {
            grainAmount = e.target.value / 100.0;
        });

        // Gradient select
        gradientSelect.addEventListener('change', (e) => {
            if (e.target.value === 'none') {
                useGradientMap = false;
                gradientStops = [];
            } else {
                useGradientMap = true;
                gradientStops = JSON.parse(JSON.stringify(gradientPresets[e.target.value]));
            }
        });

        // Double-click gradient select to open editor
        gradientSelect.addEventListener('dblclick', () => {
            openGradientEditor();
        });

        // Gradient editor functions
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16) / 255,
                g: parseInt(result[2], 16) / 255,
                b: parseInt(result[3], 16) / 255
            } : null;
        }

        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (Math.round(r * 255) << 16) + (Math.round(g * 255) << 8) + Math.round(b * 255)).toString(16).slice(1);
        }

        function applyGradientMap(color) {
            if (!useGradientMap || gradientStops.length === 0) return color;

            const luminance = color[0] * 0.299 + color[1] * 0.587 + color[2] * 0.114;

            // Find the two stops to interpolate between
            let stop1 = gradientStops[0];
            let stop2 = gradientStops[gradientStops.length - 1];

            for (let i = 0; i < gradientStops.length - 1; i++) {
                if (luminance >= gradientStops[i].pos && luminance <= gradientStops[i + 1].pos) {
                    stop1 = gradientStops[i];
                    stop2 = gradientStops[i + 1];
                    break;
                }
            }

            const t = (luminance - stop1.pos) / (stop2.pos - stop1.pos) || 0;
            const rgb1 = hexToRgb(stop1.color);
            const rgb2 = hexToRgb(stop2.color);

            return [
                rgb1.r + (rgb2.r - rgb1.r) * t,
                rgb1.g + (rgb2.g - rgb1.g) * t,
                rgb1.b + (rgb2.b - rgb1.b) * t
            ];
        }

        function updateGradientPreview() {
            const canvas = document.createElement('canvas');
            canvas.width = gradientPreview.offsetWidth;
            canvas.height = 40;
            const ctx = canvas.getContext('2d');

            if (gradientStops.length === 0) {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradientStops.forEach(stop => {
                    gradient.addColorStop(stop.pos, stop.color);
                });
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            gradientPreview.style.backgroundImage = `url(${canvas.toDataURL()})`;
            gradientPreview.style.backgroundSize = 'cover';
        }

        function renderColorStops() {
            colorStopsContainer.innerHTML = '';
            gradientStops.forEach((stop, index) => {
                const div = document.createElement('div');
                div.className = 'color-stop';
                div.innerHTML = `
                    <input type="color" value="${stop.color}" data-index="${index}">
                    <input type="text" value="${stop.color}" data-index="${index}" class="hex-input" placeholder="#FFFFFF">
                    <input type="number" min="0" max="100" step="1" value="${Math.round(stop.pos * 100)}" data-index="${index}">
                    <span style="color: rgba(255,255,255,0.5);">%</span>
                    <button data-index="${index}" class="remove-stop">Remove</button>
                `;
                colorStopsContainer.appendChild(div);
            });

            // Add event listeners for color picker
            document.querySelectorAll('.color-stop input[type="color"]').forEach(input => {
                input.addEventListener('input', (e) => {
                    const index = parseInt(e.target.dataset.index);
                    gradientStops[index].color = e.target.value;
                    // Update hex input
                    const hexInput = e.target.parentElement.querySelector('.hex-input');
                    hexInput.value = e.target.value;
                    updateGradientPreview();
                });
            });

            // Add event listeners for hex text input
            document.querySelectorAll('.color-stop .hex-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const index = parseInt(e.target.dataset.index);
                    let hex = e.target.value.trim();
                    // Add # if missing
                    if (!hex.startsWith('#')) {
                        hex = '#' + hex;
                    }
                    // Validate hex color (3 or 6 digit)
                    if (/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(hex)) {
                        // Convert 3-digit to 6-digit
                        if (hex.length === 4) {
                            hex = '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
                        }
                        gradientStops[index].color = hex.toLowerCase();
                        // Update color picker
                        const colorPicker = e.target.parentElement.querySelector('input[type="color"]');
                        colorPicker.value = hex.toLowerCase();
                        updateGradientPreview();
                    }
                });
            });

            document.querySelectorAll('.color-stop input[type="number"]').forEach(input => {
                input.addEventListener('input', (e) => {
                    const index = parseInt(e.target.dataset.index);
                    gradientStops[index].pos = parseFloat(e.target.value) / 100;
                    gradientStops.sort((a, b) => a.pos - b.pos);
                    renderColorStops();
                    updateGradientPreview();
                });
            });

            document.querySelectorAll('.remove-stop').forEach(button => {
                button.addEventListener('click', (e) => {
                    const index = parseInt(e.target.dataset.index);
                    gradientStops.splice(index, 1);
                    renderColorStops();
                    updateGradientPreview();
                });
            });
        }

        function openGradientEditor() {
            if (gradientStops.length === 0) {
                gradientStops = JSON.parse(JSON.stringify(gradientPresets['purple-pink']));
            }
            renderColorStops();
            updateGradientPreview();
            gradientEditor.classList.add('show');
        }

        document.getElementById('add-stop').addEventListener('click', () => {
            gradientStops.push({ pos: 0.5, color: '#ffffff' });
            gradientStops.sort((a, b) => a.pos - b.pos);
            renderColorStops();
            updateGradientPreview();
        });

        document.getElementById('apply-gradient').addEventListener('click', () => {
            useGradientMap = true;
            gradientSelect.value = 'none'; // Set to custom
            gradientEditor.classList.remove('show');
            showNotification('Gradient map applied');
        });

        document.getElementById('close-editor').addEventListener('click', () => {
            gradientEditor.classList.remove('show');
        });

        // Show notification
        function showNotification(message) {
            notificationDiv.textContent = message;
            notificationDiv.classList.add('show');
            setTimeout(() => {
                notificationDiv.classList.remove('show');
            }, 2000);
        }

        // Export current frame as PNG
        function exportPNG() {
            const currentShader = document.querySelector('button.active').id;
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
            const filename = `shader-jam-${currentShader}-${timestamp}.png`;

            // Wait for next frame to ensure render is complete
            requestAnimationFrame(() => {
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename;
                    link.click();
                    URL.revokeObjectURL(url);

                    showNotification(`Exported ${filename}`);
                }, 'image/png');
            });
        }

        // Keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            // Press 'S' or 'E' to export PNG
            if (e.key === 's' || e.key === 'S' || e.key === 'e' || e.key === 'E') {
                e.preventDefault();
                exportPNG();
            }
        });

        const vertexShaderSource = `
            attribute vec2 a_position;
            void main() {
                gl_Position = vec4(a_position, 0.0, 1.0);
            }
        `;

        const gradientMapCode = `
                uniform float u_useGradient;
                uniform int u_gradientCount;
                uniform float u_gradientPos[10];
                uniform vec3 u_gradientColors[10];

                vec3 applyGradientMap(vec3 color) {
                    if (u_useGradient < 0.5 || u_gradientCount < 2) return color;

                    float luminance = dot(color, vec3(0.299, 0.587, 0.114));

                    // Clamp to first stop
                    if (luminance <= u_gradientPos[0]) return u_gradientColors[0];

                    // Find stops and interpolate
                    vec3 result = u_gradientColors[9];
                    for (int i = 0; i < 9; i++) {
                        if (i >= u_gradientCount - 1) {
                            result = u_gradientColors[i];
                            break;
                        }
                        if (luminance >= u_gradientPos[i] && luminance <= u_gradientPos[i + 1]) {
                            float t = (luminance - u_gradientPos[i]) / (u_gradientPos[i + 1] - u_gradientPos[i] + 0.0001);
                            result = mix(u_gradientColors[i], u_gradientColors[i + 1], t);
                            break;
                        }
                    }

                    return result;
                }
        `;

        const shaders = {
            pearl: `
                precision mediump float;
                uniform vec2 u_resolution;
                uniform float u_time;
                uniform vec2 u_mouse;
                uniform float u_grain;

                ${gradientMapCode}

                vec3 pearlInterference(float thickness, float angle) {
                    vec3 wavelengths = vec3(650.0, 520.0, 450.0);
                    float filmThickness = thickness * 280.0 + 180.0;
                    vec3 phase = 4.0 * 3.14159 * filmThickness * cos(angle) / wavelengths;
                    vec3 intensity = 0.5 + 0.5 * cos(phase);

                    vec3 purple = vec3(0.55, 0.35, 0.75);
                    vec3 pink = vec3(0.85, 0.65, 0.80);
                    vec3 tint = mix(purple, pink, thickness);

                    return intensity * tint;
                }

                void main() {
                    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                    float time = u_time * 0.2;
                    vec2 mousePos = u_mouse;

                    vec2 warp = vec2(
                        sin(uv.y * 3.0 + time + mousePos.x * 2.0) * 0.15,
                        cos(uv.x * 3.0 - time * 0.7 + mousePos.y * 2.0) * 0.15
                    );
                    vec2 warpedUV = uv + warp;

                    float thickness = sin(warpedUV.x * 6.0 + time * 1.5) *
                                      cos(warpedUV.y * 5.0 - time * 1.2) * 0.5 + 0.5;

                    float mouseDist = distance(uv, mousePos);
                    float noise = sin(warpedUV.x * 10.0 + warpedUV.y * 8.0 + time * 0.8);
                    thickness += noise * (0.2 + mouseDist * 0.3);

                    float angle = length(uv - mousePos) * 1.3;

                    vec3 rgb = pearlInterference(thickness, angle);
                    rgb = rgb * 0.85 + 0.15;

                    if (u_grain > 0.0) {
                        float grain = fract(sin(dot(uv * 1000.0 + time * 0.1, vec2(12.9898, 78.233))) * 43758.5453);
                        grain = (grain - 0.5) * u_grain * 0.15;
                        rgb += grain;
                    }

                    rgb = applyGradientMap(rgb);

                    gl_FragColor = vec4(rgb, 1.0);
                }
            `,
            opal: `
                precision mediump float;
                uniform vec2 u_resolution;
                uniform float u_time;
                uniform vec2 u_mouse;
                uniform float u_grain;

                vec3 thinFilmColor(float thickness, float angle) {
                    vec3 wavelengths = vec3(640.0, 510.0, 460.0);
                    float filmThickness = thickness * 320.0 + 190.0;
                    vec3 phase = 4.0 * 3.14159 * filmThickness * cos(angle) / wavelengths;
                    vec3 intensity = 0.5 + 0.5 * cos(phase);

                    vec3 purple = vec3(0.50, 0.30, 0.72);
                    vec3 pink = vec3(0.90, 0.70, 0.85);
                    vec3 tint = mix(purple, pink, thickness);

                    return intensity * tint;
                }

                void main() {
                    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                    float time = u_time * 0.15;

                    float thickness = sin(uv.x * 8.0 + time * 2.0 + u_mouse.x * 3.0) *
                                      cos(uv.y * 6.0 - time * 1.5 + u_mouse.y * 3.0) * 0.5 + 0.5;

                    float noise1 = sin(uv.x * 12.0 + uv.y * 10.0 + time);
                    float noise2 = cos(uv.x * 8.0 - uv.y * 15.0 - time * 0.7);
                    thickness += (noise1 + noise2) * 0.15;

                    float angle = length(uv - u_mouse) * 1.5;

                    vec3 rgb = thinFilmColor(thickness, angle);
                    rgb = rgb * 0.88 + 0.12;

                    if (u_grain > 0.0) {
                        float grain = fract(sin(dot(uv * 1000.0 + time * 0.1, vec2(12.9898, 78.233))) * 43758.5453);
                        grain = (grain - 0.5) * u_grain * 0.15;
                        rgb += grain;
                    }

                    rgb = applyGradientMap(rgb);

                    gl_FragColor = vec4(rgb, 1.0);
                }
            `,
            flow: `
                precision mediump float;
                uniform vec2 u_resolution;
                uniform float u_time;
                uniform vec2 u_mouse;
                uniform float u_grain;

                float hash(vec2 p) {
                    p = fract(p * vec2(123.34, 456.21));
                    p += dot(p, p + 45.32);
                    return fract(p.x * p.y);
                }

                float smoothNoise(vec2 p) {
                    vec2 i = floor(p);
                    vec2 f = fract(p);
                    f = f * f * (3.0 - 2.0 * f);

                    float a = hash(i);
                    float b = hash(i + vec2(1.0, 0.0));
                    float c = hash(i + vec2(0.0, 1.0));
                    float d = hash(i + vec2(1.0, 1.0));

                    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
                }

                float fractalNoise(vec2 p) {
                    float value = 0.0;
                    float amplitude = 0.5;

                    for(int i = 0; i < 4; i++) {
                        value += amplitude * smoothNoise(p);
                        p *= 2.0;
                        amplitude *= 0.5;
                    }

                    return value;
                }

                vec3 flowInterference(float thickness, float angle, float layer) {
                    vec3 wavelengths = vec3(655.0, 525.0, 445.0);
                    float filmThickness = thickness * 290.0 + 190.0 + layer * 30.0;

                    vec3 phase = 4.0 * 3.14159 * filmThickness * cos(angle) / wavelengths;
                    vec3 intensity = 0.5 + 0.5 * cos(phase);

                    float blend = thickness * 0.5 + 0.5;
                    blend = smoothstep(0.0, 1.0, blend);

                    vec3 purple = vec3(0.50, 0.30, 0.75);
                    vec3 pink = vec3(0.90, 0.70, 0.85);
                    vec3 tint = mix(purple, pink, blend);

                    return intensity * tint;
                }

                void main() {
                    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                    float time = u_time * 0.3;

                    vec2 mouseInfluence = (u_mouse - 0.5) * 0.5;

                    // Add strong rotation to UV coordinates
                    vec2 center = vec2(0.5, 0.5);
                    vec2 centeredUV = uv - center;

                    // Much faster rotation based on time and distance
                    float distFromCenter = length(centeredUV);
                    float rotation = time * 0.8 + distFromCenter * 2.5;

                    float cosR = cos(rotation);
                    float sinR = sin(rotation);
                    vec2 rotatedUV = vec2(
                        centeredUV.x * cosR - centeredUV.y * sinR,
                        centeredUV.x * sinR + centeredUV.y * cosR
                    ) + center;

                    // Add secondary rotation layer for more movement
                    float rotation2 = -time * 0.4 + distFromCenter * 1.2;
                    float cosR2 = cos(rotation2);
                    float sinR2 = sin(rotation2);
                    vec2 doubleRotatedUV = vec2(
                        rotatedUV.x * cosR2 - rotatedUV.y * sinR2,
                        rotatedUV.x * sinR2 + rotatedUV.y * cosR2
                    );

                    // Use double-rotated UV for calculations
                    uv = doubleRotatedUV;

                    // Multiple flowing centers that also rotate
                    float centerRotation = time * 0.5;
                    vec2 center1 = vec2(0.5, 0.5) + vec2(
                        sin(time * 0.6 + centerRotation + mouseInfluence.x * 1.5) * 0.2,
                        cos(time * 0.8 + centerRotation + mouseInfluence.y * 1.5) * 0.2
                    );

                    vec2 center2 = vec2(0.5, 0.5) + vec2(
                        cos(time * 0.7 - centerRotation - mouseInfluence.y * 1.2) * 0.18,
                        sin(time * 0.9 + centerRotation + mouseInfluence.x * 1.2) * 0.16
                    );

                    vec2 center3 = vec2(0.5, 0.5) + vec2(
                        sin(time * 0.55 + centerRotation * 0.8 + mouseInfluence.x * 0.9) * 0.22,
                        cos(time * 0.75 - centerRotation * 0.8 - mouseInfluence.y * 0.9) * 0.19
                    );

                    float dist1 = distance(uv, center1);
                    float dist2 = distance(uv, center2);
                    float dist3 = distance(uv, center3);

                    float distField = (dist1 + dist2 * 0.7 + dist3 * 0.5) / 2.2;

                    float angle1 = atan(uv.y - center1.y, uv.x - center1.x) + time * 0.6;
                    float angle2 = atan(uv.y - center2.y, uv.x - center2.x) - time * 0.5;

                    float noise1 = fractalNoise(uv * 2.5 + vec2(cos(time * 0.3), sin(time * 0.3)) * 0.5);
                    float noise2 = fractalNoise(uv * 3.8 + vec2(sin(time * 0.25), cos(time * 0.25)) * 0.4);
                    float noise3 = fractalNoise(uv * 5.2 + vec2(cos(time * 0.2), -sin(time * 0.2)) * 0.3);

                    float wave1 = sin(dist1 * 6.0 - time * 3.5 + angle1 * 2.0) * 0.25;
                    float wave2 = sin(dist2 * 4.5 + time * 3.0 - angle2 * 1.5) * 0.2;
                    float wave3 = sin(dist3 * 7.5 - time * 2.8 + angle1 * 1.3) * 0.18;

                    vec2 flowUV = uv + vec2(
                        sin(uv.y * 4.0 + mouseInfluence.x * 3.0 + time) * 0.03,
                        cos(uv.x * 4.0 + mouseInfluence.y * 3.0 - time * 0.8) * 0.03
                    );

                    float flowNoise = fractalNoise(flowUV * 6.0 + time * 0.1);

                    float thickness = 0.5 +
                                     wave1 + wave2 + wave3 +
                                     noise1 * 0.15 +
                                     noise2 * 0.12 +
                                     noise3 * 0.1 +
                                     flowNoise * 0.08;

                    thickness = smoothstep(0.2, 0.8, thickness);

                    float viewAngle = distField * 1.2 +
                                     sin(time * 0.35 + noise1) * 0.15 +
                                     cos(time * 0.28 - noise2) * 0.12;

                    vec3 rgb = vec3(0.0);
                    rgb += flowInterference(thickness, viewAngle, 0.0) * 0.38;
                    rgb += flowInterference(thickness * 0.9 + 0.15, viewAngle * 0.92, 1.0) * 0.34;
                    rgb += flowInterference(thickness * 1.1 - 0.1, viewAngle * 1.08, 2.0) * 0.28;

                    rgb = rgb * 0.88 + 0.12;
                    rgb = smoothstep(0.0, 1.0, rgb);

                    if (u_grain > 0.0) {
                        float grain = fract(sin(dot(uv * 1000.0 + time * 0.1, vec2(12.9898, 78.233))) * 43758.5453);
                        grain = (grain - 0.5) * u_grain * 0.15;
                        rgb += grain;
                    }

                    rgb = applyGradientMap(rgb);

                    gl_FragColor = vec4(rgb, 1.0);
                }
            `,
            waves: `
                precision mediump float;
                uniform vec2 u_resolution;
                uniform float u_time;
                uniform vec2 u_mouse;
                uniform float u_grain;

                vec3 waveInterference(float thickness, float angle) {
                    vec3 wavelengths = vec3(670.0, 540.0, 440.0);
                    float filmThickness = thickness * 295.0 + 185.0;
                    vec3 phase = 4.0 * 3.14159 * filmThickness * cos(angle) / wavelengths;
                    vec3 intensity = 0.5 + 0.5 * cos(phase);

                    vec3 purple = vec3(0.48, 0.28, 0.76);
                    vec3 pink = vec3(0.92, 0.72, 0.88);
                    vec3 tint = mix(purple, pink, smoothstep(0.2, 0.8, thickness));

                    return intensity * tint;
                }

                void main() {
                    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                    float time = u_time * 0.18;

                    vec2 mousePos = mix(vec2(0.5, 0.5), u_mouse, 0.3);

                    float dist = distance(uv, mousePos);

                    float wave1 = sin(dist * 8.0 - time * 2.5);
                    float wave2 = sin(dist * 6.0 + time * 2.0);
                    float wave3 = cos(dist * 10.0 - time * 1.8);

                    float thickness = (wave1 + wave2 + wave3) * 0.15 + 0.5;
                    thickness = smoothstep(0.0, 1.0, thickness);

                    vec2 mouseInfluence = (u_mouse - 0.5) * 2.0;
                    float directional = sin(uv.x * 5.0 + mouseInfluence.x * 2.0 + time) *
                                        cos(uv.y * 5.0 + mouseInfluence.y * 2.0 - time * 0.8);
                    thickness += directional * 0.1;

                    float angle = dist * 1.4 + time * 0.2;

                    vec3 rgb = waveInterference(thickness, angle);
                    rgb = rgb * 0.87 + 0.13;

                    if (u_grain > 0.0) {
                        float grain = fract(sin(dot(uv * 1000.0 + time * 0.1, vec2(12.9898, 78.233))) * 43758.5453);
                        grain = (grain - 0.5) * u_grain * 0.15;
                        rgb += grain;
                    }

                    gl_FragColor = vec4(rgb, 1.0);
                }
            `
        };

        function compileShader(source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);

            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                const info = gl.getShaderInfoLog(shader);
                errorDiv.textContent = 'Shader compilation error: ' + info;
                errorDiv.style.display = 'block';
                gl.deleteShader(shader);
                return null;
            }
            errorDiv.style.display = 'none';
            return shader;
        }

        function createProgram(fragmentSource) {
            const vertexShader = compileShader(vertexShaderSource, gl.VERTEX_SHADER);
            const fragmentShader = compileShader(fragmentSource, gl.FRAGMENT_SHADER);

            if (!vertexShader || !fragmentShader) return null;

            const prog = gl.createProgram();
            gl.attachShader(prog, vertexShader);
            gl.attachShader(prog, fragmentShader);
            gl.linkProgram(prog);

            if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
                const info = gl.getProgramInfoLog(prog);
                errorDiv.textContent = 'Program linking error: ' + info;
                errorDiv.style.display = 'block';
                return null;
            }

            return prog;
        }

        function setupGeometry() {
            const buffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
                -1, -1,
                 1, -1,
                -1,  1,
                 1,  1
            ]), gl.STATIC_DRAW);

            const positionLocation = gl.getAttribLocation(program, 'a_position');
            gl.enableVertexAttribArray(positionLocation);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
        }

        function render() {
            const time = (Date.now() - startTime) / 1000;

            const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
            const timeLocation = gl.getUniformLocation(program, 'u_time');
            const mouseLocation = gl.getUniformLocation(program, 'u_mouse');
            const grainLocation = gl.getUniformLocation(program, 'u_grain');
            const useGradientLocation = gl.getUniformLocation(program, 'u_useGradient');
            const gradientCountLocation = gl.getUniformLocation(program, 'u_gradientCount');

            gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
            gl.uniform1f(timeLocation, time);
            gl.uniform2f(mouseLocation, mouseX, mouseY);
            gl.uniform1f(grainLocation, grainAmount);
            gl.uniform1f(useGradientLocation, useGradientMap ? 1.0 : 0.0);
            gl.uniform1i(gradientCountLocation, gradientStops.length);

            // Pass gradient stops to shader
            if (useGradientMap && gradientStops.length > 0) {
                const positions = [];
                const colors = [];

                gradientStops.forEach(stop => {
                    positions.push(stop.pos);
                    const rgb = hexToRgb(stop.color);
                    colors.push(rgb.r, rgb.g, rgb.b);
                });

                const positionsLocation = gl.getUniformLocation(program, 'u_gradientPos');
                const colorsLocation = gl.getUniformLocation(program, 'u_gradientColors');

                gl.uniform1fv(positionsLocation, positions);
                gl.uniform3fv(colorsLocation, colors);
            }

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            requestAnimationFrame(render);
        }

        function loadShader(name) {
            if (program) {
                gl.deleteProgram(program);
            }

            program = createProgram(shaders[name]);
            if (program) {
                gl.useProgram(program);
                setupGeometry();

                document.querySelectorAll('button').forEach(btn => {
                    btn.classList.remove('active');
                });
                document.getElementById(name).classList.add('active');

                startTime = Date.now();
            }
        }

        document.getElementById('pearl').addEventListener('click', () => loadShader('pearl'));
        document.getElementById('opal').addEventListener('click', () => loadShader('opal'));
        document.getElementById('flow').addEventListener('click', () => loadShader('flow'));
        document.getElementById('waves').addEventListener('click', () => loadShader('waves'));

        loadShader('pearl');
        render();
    </script>
</body>
